<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COPYRIGHT INFRINGEMENT — uchuuj1n</title>
<meta name="description" content="COPYRIGHT INFRINGEMENT — EP by uchuuj1n">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  background: #000;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,100,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,100,255,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 50%, rgba(40,0,120,0.25) 0%, transparent 70%);
  pointer-events: none;
}

/* ─── SHELL ─────────────────────────────────────────────── */
.shell {
  position: relative;
  width: 480px;
  background: linear-gradient(145deg,
    rgba(255,255,255,0.09) 0%,
    rgba(80,120,255,0.06) 40%,
    rgba(100,0,255,0.04) 100%);
  border: 1px solid rgba(100,160,255,0.35);
  border-radius: 28px;
  padding: 28px 28px 22px;
  box-shadow:
    0 0 0 1px rgba(0,80,255,0.15),
    0 0 60px rgba(0,100,255,0.18),
    0 0 120px rgba(80,0,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 0 60px rgba(0,60,180,0.08);
  backdrop-filter: blur(2px);
}

.shell::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  pointer-events: none;
}

.shell::after {
  content: '';
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #0066ff, #6600ff, #0066ff, transparent);
  border-radius: 2px;
  filter: blur(2px);
  box-shadow: 0 0 12px rgba(0,100,255,0.8), 0 0 24px rgba(100,0,255,0.4);
}

/* ─── HEADER ─────────────────────────────────────────────── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 0.25em;
  color: rgba(160,200,255,0.9);
  text-shadow: 0 0 12px rgba(100,160,255,0.6);
}

.status-pill {
  font-size: 9px;
  letter-spacing: 0.2em;
  padding: 3px 10px;
  border: 1px solid rgba(0,200,255,0.3);
  border-radius: 20px;
  color: #00c8ff;
  background: rgba(0,100,200,0.12);
  text-shadow: 0 0 6px rgba(0,200,255,0.6);
  animation: pulse-status 2s ease-in-out infinite;
}

@keyframes pulse-status {
  0%,100% { opacity: 1; box-shadow: 0 0 8px rgba(0,200,255,0.2); }
  50% { opacity: 0.7; box-shadow: none; }
}

/* ─── CD DISC ─────────────────────────────────────────────── */
.disc-area {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
  position: relative;
}

.disc-area::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(80,0,255,0.2) 0%, rgba(0,60,255,0.1) 40%, transparent 70%);
  filter: blur(8px);
}

.disc {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}

.disc-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    rgba(0,120,255,0.55),
    rgba(120,0,255,0.55),
    rgba(0,200,255,0.45),
    rgba(255,60,160,0.35),
    rgba(0,255,200,0.35),
    rgba(80,0,255,0.5),
    rgba(0,120,255,0.55)
  );
  box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,100,255,0.25), 0 0 40px rgba(80,0,200,0.15);
}

.disc-shimmer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 60deg,
    rgba(255,255,255,0.18),
    transparent 20%,
    rgba(255,255,255,0.08) 35%,
    transparent 50%,
    rgba(255,255,255,0.12) 70%,
    transparent 85%,
    rgba(255,255,255,0.18) 100%
  );
}

.disc-rings {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 6px,
    rgba(0,0,0,0.25) 6px,
    rgba(0,0,0,0.25) 7px
  );
}

.disc-inner {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(100,160,255,0.4);
  box-shadow: 0 0 16px rgba(80,0,255,0.4), inset 0 0 20px rgba(80,0,255,0.25);
}

.disc-hole {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #000;
  border: 1px solid rgba(100,160,255,0.5);
  box-shadow: 0 0 8px rgba(80,0,255,0.6);
  z-index: 5;
}

.disc-orb {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle, #cc44ff 0%, #6600cc 50%, transparent 80%);
  filter: blur(1px);
  box-shadow: 0 0 12px rgba(160,0,255,0.9), 0 0 24px rgba(100,0,200,0.6), 0 0 40px rgba(80,0,160,0.3);
  animation: orb-pulse 2s ease-in-out infinite;
  z-index: 10;
}

@keyframes orb-pulse {
  0%,100% { transform: translate(-50%, -50%) scale(1); filter: blur(1px); }
  50% { transform: translate(-50%, -50%) scale(1.2); filter: blur(2px); }
}

.disc.playing .disc-outer,
.disc.playing .disc-shimmer,
.disc.playing .disc-rings {
  animation: spin 3.5s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ─── TRACK INFO ─────────────────────────────────────────── */
.track-info {
  text-align: center;
  margin-bottom: 16px;
}

.track-name {
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  color: #e0eeff;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
  text-shadow: 0 0 10px rgba(100,160,255,0.5);
}

.track-artist {
  font-size: 10px;
  color: rgba(140,160,255,0.6);
  letter-spacing: 0.2em;
  margin-bottom: 2px;
}

.track-meta {
  font-size: 9px;
  color: rgba(80,120,255,0.5);
  letter-spacing: 0.25em;
}

/* ─── PROGRESS ───────────────────────────────────────────── */
.progress-wrap { margin-bottom: 20px; }

.progress-track {
  width: 100%;
  height: 3px;
  background: rgba(80,120,255,0.15);
  border: 1px solid rgba(80,120,255,0.25);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #0055ff, #8800ff);
  border-radius: 2px;
  width: 0%;
  box-shadow: 0 0 8px rgba(0,100,255,0.7);
  transition: width 0.4s linear;
}

.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #aad0ff;
  border: 1px solid rgba(100,160,255,0.8);
  box-shadow: 0 0 6px rgba(0,150,255,0.8);
  left: 0%;
  pointer-events: none;
  transition: left 0.4s linear;
}

.time-row {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
  font-size: 9px;
  color: rgba(100,160,255,0.55);
  letter-spacing: 0.1em;
}

/* ─── CONTROLS ───────────────────────────────────────────── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 20px;
}

.ctrl {
  background: rgba(0,40,120,0.25);
  border: 1px solid rgba(80,140,255,0.25);
  color: rgba(140,190,255,0.85);
  cursor: pointer;
  font-size: 14px;
  padding: 9px 14px;
  border-radius: 8px;
  transition: all 0.12s;
  line-height: 1;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
}

.ctrl:hover {
  background: rgba(0,80,200,0.3);
  border-color: rgba(100,180,255,0.5);
  color: #c0e0ff;
  box-shadow: 0 0 12px rgba(0,100,255,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
}

.ctrl:active { transform: scale(0.94); }

.ctrl.main {
  font-size: 18px;
  padding: 11px 20px;
  background: rgba(0,60,180,0.35);
  border-color: rgba(80,160,255,0.5);
  box-shadow: 0 0 16px rgba(0,80,255,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
}

.ctrl.main:hover {
  background: rgba(0,80,200,0.45);
  box-shadow: 0 0 24px rgba(0,100,255,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
}

/* ─── VOLUME ─────────────────────────────────────────────── */
.vol-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding: 0 2px;
}

.vol-label {
  font-size: 9px;
  color: rgba(100,160,255,0.55);
  letter-spacing: 0.2em;
  min-width: 28px;
}

.vol-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: rgba(80,120,255,0.2);
  border: none;
  border-radius: 2px;
  outline: none;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 11px;
  border-radius: 50%;
  background: #7ab0ff;
  border: 1px solid rgba(120,180,255,0.8);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(0,120,255,0.6);
}

.vol-pct {
  font-size: 9px;
  color: rgba(100,160,255,0.55);
  min-width: 28px;
  text-align: right;
}

/* ─── PLAYLIST ───────────────────────────────────────────── */
.pl-section {
  border-top: 1px solid rgba(80,120,255,0.15);
  padding-top: 16px;
}

.pl-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.pl-title {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: rgba(100,160,255,0.5);
}

.pl-count {
  font-size: 9px;
  color: rgba(80,100,255,0.45);
  letter-spacing: 0.1em;
}

.playlist { max-height: 160px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(80,100,255,0.3) transparent; }

.pl-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  cursor: pointer;
  border-bottom: 1px solid rgba(80,120,255,0.08);
  transition: all 0.1s;
  border-radius: 4px;
}

.pl-item:hover { background: rgba(0,60,180,0.15); }

.pl-item.active {
  background: rgba(0,60,180,0.22);
  border-left: 2px solid #5599ff;
  padding-left: 6px;
}

.pl-num {
  font-size: 9px;
  color: rgba(80,140,255,0.45);
  min-width: 18px;
  text-align: right;
}

.pl-item.active .pl-num { color: #9966ff; }

.pl-name {
  flex: 1;
  font-size: 11px;
  color: rgba(160,200,255,0.75);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pl-item.active .pl-name { color: #d0e8ff; }

.pl-tag {
  font-size: 8px;
  color: rgba(80,100,200,0.5);
  letter-spacing: 0.1em;
  margin-left: 2px;
  flex-shrink: 0;
}

.pl-item.active .pl-tag { color: rgba(120,140,255,0.6); }

/* ─── TRACK NOTE ─────────────────────────────────────────── */
.track-note {
  text-align: center;
  margin-bottom: 18px;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.track-note-inner {
  font-size: 9px;
  color: rgba(100,140,220,0.55);
  letter-spacing: 0.12em;
  line-height: 1.7;
  border-top: 1px solid rgba(80,120,255,0.12);
  border-bottom: 1px solid rgba(80,120,255,0.12);
  padding: 7px 12px;
  width: 100%;
}

/* ─── HARDWARE DETAILS ───────────────────────────────────── */
.screw {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(100,160,255,0.25);
  background: radial-gradient(circle at 35% 35%, rgba(200,220,255,0.2), rgba(20,30,60,0.6));
}
.screw::before {
  content: '+';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 7px;
  color: rgba(100,160,255,0.3);
  line-height: 1;
}
.screw.tl { top: 12px; left: 14px; }
.screw.tr { top: 12px; right: 14px; }
.screw.bl { bottom: 24px; left: 14px; }
.screw.br { bottom: 24px; right: 14px; }

.bracket { position: absolute; width: 14px; height: 14px; }
.bracket.tl { top: 0; left: 0; border-top: 1.5px solid rgba(0,200,255,0.5); border-left: 1.5px solid rgba(0,200,255,0.5); border-radius: 28px 0 0 0; }
.bracket.tr { top: 0; right: 0; border-top: 1.5px solid rgba(0,200,255,0.5); border-right: 1.5px solid rgba(0,200,255,0.5); border-radius: 0 28px 0 0; }
.bracket.bl { bottom: 0; left: 0; border-bottom: 1.5px solid rgba(0,200,255,0.5); border-left: 1.5px solid rgba(0,200,255,0.5); border-radius: 0 0 0 28px; }
.bracket.br { bottom: 0; right: 0; border-bottom: 1.5px solid rgba(0,200,255,0.5); border-right: 1.5px solid rgba(0,200,255,0.5); border-radius: 0 0 28px 0; }

.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="shell">
  <div class="screw tl"></div>
  <div class="screw tr"></div>
  <div class="screw bl"></div>
  <div class="screw br"></div>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="header">
    <div class="logo">COPYRIGHT INFRINGEMENT</div>
    <div class="status-pill" id="statusPill">◌ STANDBY</div>
  </div>

  <div class="track-note"><div class="track-note-inner" id="trackNote"></div></div>

  <div class="disc-area">
    <div class="disc" id="disc">
      <div class="disc-outer"></div>
      <div class="disc-shimmer"></div>
      <div class="disc-rings"></div>
      <div class="disc-inner"></div>
      <div class="disc-orb"></div>
      <div class="disc-hole"></div>
    </div>
  </div>

  <div class="track-info">
    <div class="track-name" id="trackName">SELECT A TRACK</div>
    <div class="track-artist" id="trackArtist">uchuuj1n</div>
    <div class="track-meta" id="trackMeta">[ — / 4 ]</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <div class="time-row">
      <span id="timeNow">0:00</span>
      <span id="timeTotal">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" id="btnPrev" title="Précédent">⏮</button>
    <button class="ctrl" id="btnStop" title="Stop">⏹</button>
    <button class="ctrl main" id="btnPlay" title="Play/Pause">▶</button>
    <button class="ctrl" id="btnNext" title="Suivant">⏭</button>
  </div>

  <div class="vol-row">
    <span class="vol-label">VOL</span>
    <input class="vol-slider" type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
    <span class="vol-pct" id="volPct">80%</span>
  </div>

  <div class="pl-section">
    <div class="pl-header">
      <div class="pl-title">// TRACKLIST</div>
      <div class="pl-count" id="plCount">5 TRACKS</div>
    </div>
    <div class="playlist" id="playlist"></div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
const TRACKS = [
  {
    title: "How Bad it Can Get", tag: "[UNFINISHED]", artist: "uchuuj1n",
    src: "mp3/How Bad it can get.mp3",
    note: "sample: Razzamataz — Froggy Mix · quote: The Amazing Digital Circus Finale"
  },
  {
    title: "Sex Symbol sous Acides", tag: "[UNMASTERED]", artist: "uchuuj1n",
    src: "mp3/master_Sex Symbol sous Acides.mp3",
    note: "sample: Starmania — Les adieux d'un sex symbol, le rêve de Stella Spotlight · Maags, Diane Dufresne, Sabrina Lory"
  },
  {
    title: "Soupirs", tag: "", artist: "uchuuj1n",
    src: "mp3/master_Soupirs.mp3",
    note: "sample: Oriska &amp; Ocean Drive — Your Desire"
  },
  {
    title: "Wild Side", tag: "[UNFINISHED]", artist: "uchuuj1n",
    src: "mp3/master_Wild Side.mp3",
    note: "sample: Kesha — Tik Tok · Your Love Is My Drug · Die Young · Timber"
  },
  {
    title: "Worth Nothing", tag: "", artist: "uchuuj1n",
    src: "mp3/Worth Nothing.mp3",
    note: "sample: Oliver Tree — Jerk"
  },
];

const audio         = document.getElementById('audio');
const disc          = document.getElementById('disc');
const btnPlay       = document.getElementById('btnPlay');
const btnPrev       = document.getElementById('btnPrev');
const btnNext       = document.getElementById('btnNext');
const btnStop       = document.getElementById('btnStop');
const trackName     = document.getElementById('trackName');
const trackArtist   = document.getElementById('trackArtist');
const trackMeta     = document.getElementById('trackMeta');
const trackNote     = document.getElementById('trackNote');
const progressFill  = document.getElementById('progressFill');
const progressThumb = document.getElementById('progressThumb');
const progressTrack = document.getElementById('progressTrack');
const timeNow       = document.getElementById('timeNow');
const timeTotal     = document.getElementById('timeTotal');
const volSlider     = document.getElementById('volSlider');
const volPct        = document.getElementById('volPct');
const statusPill    = document.getElementById('statusPill');
const playlistEl    = document.getElementById('playlist');

let idx = 0;
let playing = false;

const fmt = s => {
  if (!s || isNaN(s)) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
};

function setStatus(text, color) {
  statusPill.textContent = text;
  statusPill.style.color = color || '#00c8ff';
}

function loadTrack(i, autoPlay) {
  idx = i;
  const t = TRACKS[i];
  audio.src = t.src;
  trackName.textContent   = t.tag ? `${t.title} ${t.tag}` : t.title;
  trackArtist.textContent = t.artist;
  trackNote.innerHTML     = t.note || '';
  trackMeta.textContent   = `[ ${i+1} / ${TRACKS.length} ]`;
  progressFill.style.width = '0%';
  progressThumb.style.left = '0%';
  timeNow.textContent  = '0:00';
  timeTotal.textContent = '0:00';
  renderPlaylist();
  if (autoPlay) play();
}

function play() {
  audio.play();
  playing = true;
  btnPlay.textContent = '⏸';
  disc.classList.add('playing');
  setStatus('● PLAYING', '#55ccff');
}

function pause() {
  audio.pause();
  playing = false;
  btnPlay.textContent = '▶';
  disc.classList.remove('playing');
  setStatus('◌ PAUSED', 'rgba(100,160,255,0.7)');
}

function stop() {
  audio.pause();
  audio.currentTime = 0;
  playing = false;
  btnPlay.textContent = '▶';
  disc.classList.remove('playing');
  progressFill.style.width = '0%';
  progressThumb.style.left = '0%';
  timeNow.textContent = '0:00';
  setStatus('■ STOP', 'rgba(80,120,255,0.65)');
}

btnPlay.addEventListener('click', () => playing ? pause() : play());
btnStop.addEventListener('click', stop);
btnPrev.addEventListener('click', () => loadTrack(idx <= 0 ? TRACKS.length-1 : idx-1, playing));
btnNext.addEventListener('click', () => loadTrack((idx+1) % TRACKS.length, playing));

audio.addEventListener('ended', () => loadTrack((idx+1) % TRACKS.length, true));

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeNow.textContent   = fmt(audio.currentTime);
  timeTotal.textContent = fmt(audio.duration);
});

progressTrack.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = progressTrack.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

volSlider.addEventListener('input', () => {
  const v = parseFloat(volSlider.value);
  audio.volume = v;
  volPct.textContent = Math.round(v * 100) + '%';
});
audio.volume = 0.8;

function renderPlaylist() {
  playlistEl.innerHTML = TRACKS.map((t, i) => `
    <div class="pl-item${i===idx?' active':''}" data-i="${i}">
      <span class="pl-num">${i===idx ? '▶' : String(i+1).padStart(2,'0')}</span>
      <span class="pl-name">${t.title}</span>
      ${t.tag ? `<span class="pl-tag">${t.tag}</span>` : ''}
    </div>
  `).join('');

  playlistEl.querySelectorAll('.pl-item').forEach(el => {
    el.addEventListener('click', () => {
      loadTrack(+el.dataset.i, true);
    });
  });
}

loadTrack(0, false);
</script>
</body>
</html>
